{#
  Nav active underline (Menu.tsx does not select Home on /superset/dashboard/<slug>/).
  Login page redesign: BPHN Analytics "Kedaulatan" aesthetic.
#}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style nonce="{{ macros.get_nonce() }}">
  /* -----------------------------------------------------------------
     Nav home active underline
     ----------------------------------------------------------------- */
  .main-nav .ant-menu-item.bphn-home-nav-active::after,
  .main-nav .ant-menu-item.ant-menu-item-selected.bphn-home-nav-active::after {
    transform: scale(1);
  }

  /* =================================================================
     BPHN LOGIN PAGE REDESIGN — "Kedaulatan" (Sovereignty)
     Deep midnight · Frosted glass · Warm gold accents
     Scoped to [data-test="login-form"] so other pages are unaffected.
     ================================================================= */

  /* ---- Login Container: Variables + Layout + Background ---- */
  [data-test="login-form"] {
    --bphn-navy-deepest: #060C1A;
    --bphn-navy-deep: #0B1428;
    --bphn-navy: #121F3D;
    --bphn-navy-mid: #1A2B56;
    --bphn-gold: #D4A843;
    --bphn-gold-light: #FFC107;
    --bphn-gold-dim: #A37E2F;
    --bphn-gold-glow: rgba(212, 168, 67, 0.15);
    --bphn-text: #FFFFFF;
    --bphn-text-muted: rgba(255, 255, 255, 0.55);
    --bphn-text-dim: rgba(255, 255, 255, 0.30);
    --bphn-glass-bg: rgba(255, 255, 255, 0.035);
    --bphn-glass-border: rgba(255, 255, 255, 0.07);
    --bphn-input-bg: rgba(255, 255, 255, 0.04);
    --bphn-input-border: rgba(255, 255, 255, 0.10);

    --bphn-radius-sm: 10px;
    --bphn-gold-gradient: linear-gradient(135deg, #B8892A 0%, #D4A843 30%, #FFC107 50%, #D4A843 70%, #B8892A 100%);

    --bphn-font-body: 'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
    position: fixed !important;
    inset: 0 !important;
    z-index: 1000 !important;
    min-height: 100vh !important;
    flex-direction: column !important;
    flex-wrap: nowrap !important;
    gap: 0 !important;
    background:
      radial-gradient(ellipse 80% 60% at 25% 45%, rgba(26, 43, 86, 0.55) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 75% 25%, rgba(212, 168, 67, 0.06) 0%, transparent 55%),
      radial-gradient(ellipse 90% 70% at 50% 100%, rgba(18, 31, 61, 0.7) 0%, transparent 60%),

    overflow: hidden !important;
  }

  .bphn-login-logo,
  .bphn-login-welcome {
    flex: 0 0 auto !important;
    width: 100% !important;
    max-width: 440px !important;
    margin-left: auto !important;
    margin-right: auto !important;
  }

  /* Geometric etched-line pattern overlay */
  [data-test="login-form"]::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(30deg, rgba(212, 168, 67, 0.02) 12%, transparent 12.5%, transparent 87%, rgba(212, 168, 67, 0.02) 87.5%),
      linear-gradient(150deg, rgba(212, 168, 67, 0.02) 12%, transparent 12.5%, transparent 87%, rgba(212, 168, 67, 0.02) 87.5%),

    opacity: 0.7;
    pointer-events: none;
    z-index: 0;
  }

  /* Slow aurora shimmer in background */
  [data-test="login-form"]::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
      conic-gradient(from 0deg at 50% 50%,
        transparent 0deg,
        rgba(212, 168, 67, 0.03) 60deg,
        transparent 120deg,
        rgba(26, 43, 86, 0.05) 200deg,
        transparent 280deg,
        rgba(212, 168, 67, 0.02) 340deg,
        transparent 360deg

    animation: bphn-aurora-rotate 90s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bphn-aurora-rotate {
    to { transform: rotate(360deg); }
  }

  /* ---- Entrance Animation ---- */
  [data-test="login-form"] > * {
    animation: bphn-login-enter 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards !important;
    opacity: 0 !important;
    transform: translateY(32px) !important;
    position: relative !important;
    z-index: 1 !important;
  }

  @keyframes bphn-login-enter {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ---- Card ---- */

    background: var(--bphn-glass-bg) !important;

    border: 1px solid var(--bphn-glass-border) !important;
    border-radius: var(--bphn-radius) !important;
    box-shadow:
      0 0 0 1px rgba(212, 168, 67, 0.08),
      0 4px 6px rgba(0, 0, 0, 0.15),
      0 12px 40px rgba(0, 0, 0, 0.35) !important;
    max-width: 440px !important;
    padding: 0 !important;
    overflow: hidden;
    position: relative;
  }

  /* Gold accent line at top of card */
  [data-test="login-form"] .ant-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--bphn-gold-gradient);
    background-size: 200% 100%;
    animation: bphn-gold-shimmer 6s ease-in-out infinite;
    z-index: 2;
  }

  @keyframes bphn-gold-shimmer {

    50% { background-position: 100% 50%; }
  }

  [data-test="login-form"] .ant-card::after {
    content: '';
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    height: 160px;
    background: radial-gradient(ellipse, rgba(212, 168, 67, 0.08) 0%, transparent 70%);

    z-index: 0;
  }

  [data-test="login-form"] .ant-card-head {

    z-index: 1;

    font-family: var(--bphn-font-display) !important;
    font-size: 30px !important;
    font-weight: 400 !important;

    text-align: center !important;

    z-index: 1;

  }

  }

    to {
      opacity: 0.92;
      transform: translateY(0);

    font-family: var(--bphn-font-body);
    font-size: 12px;

    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 0 36px;
    position: relative;
    z-index: 1;

    opacity: 0 !important;
    transform: translateY(20px) !important;
  }

  /* ---- Form ---- */
  [data-test="login-form"] .ant-form-item {
    margin-bottom: 20px !important;
  }

  /* Labels */
  [data-test="login-form"] .ant-form-item-label > label {
    font-family: var(--bphn-font-body) !important;
    font-size: 11px !important;
    font-weight: 600 !important;
    color: var(--bphn-text-muted) !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
  }

  /* Input fields */

  [data-test="login-form"] .ant-input-password .ant-input {
    background: var(--bphn-input-bg) !important;
    border: 1px solid var(--bphn-input-border) !important;

    color: var(--bphn-text) !important;
    font-family: var(--bphn-font-body) !important;
    font-size: 15px !important;
    font-weight: 400 !important;
    padding: 12px 16px !important;
    height: auto !important;

  [data-test="login-form"] .ant-input:hover,
  [data-test="login-form"] .ant-input-password:hover .ant-input {

  [data-test="login-form"] .ant-input-focused,
  [data-test="login-form"] .ant-input-password .ant-input:focus,
  [data-test="login-form"] .ant-input-password.ant-input-affix-wrapper-focused .ant-input {

  [data-test="login-form"] .ant-input-affix-wrapper {
    background: var(--bphn-input-bg) !important;

  [data-test="login-form"] .ant-input-affix-wrapper:hover {

  }

  [data-test="login-form"] .ant-input-password .ant-input {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    padding: 12px 16px !important;
  }

  /* Password toggle icon */
  [data-test="login-form"] .ant-input-password .ant-input-suffix {
    color: rgba(255, 255, 255, 0.30) !important;
    margin-right: 12px !important;
  }

  [data-test="login-form"] .ant-input::placeholder {
    color: var(--bphn-text-dim) !important;
  }

    background: var(--bphn-gold-gradient) !important;
    background-size: 200% 100% !important;
    border: none !important;

    font-family: var(--bphn-font-body) !important;
    font-size: 15px !important;

      0 4px 16px rgba(212, 168, 67, 0.15),
      inset 0 1px 0 rgba(255, 255, 255, 0.2) !important;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;

    position: relative;
    overflow: hidden;
  }

  [data-test="login-form"] .ant-btn-primary::before {
    content: '';

    inset: 0;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 50%, rgba(255, 255, 255, 0.08) 100%);

    transform: translateY(-1px) !important;

  [data-test="login-form"] .ant-btn-primary:hover::before {

  [data-test="login-form"] .ant-btn-primary:active {

    border: 1px solid rgba(255, 255, 255, 0.10) !important;

    color: rgba(255, 255, 255, 0.75) !important;
    font-family: var(--bphn-font-body) !important;
    font-weight: 500 !important;
    font-size: 14px !important;
    height: auto !important;
    padding: 12px 20px !important;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important;
  }

  [data-test="login-form"] .ant-btn-default:hover {
    background: rgba(255, 255, 255, 0.08) !important;
    border-color: rgba(212, 168, 67, 0.30) !important;
    color: #FFFFFF !important;

  }

  [data-test="login-form"] .ant-btn-default:active {
    transform: translateY(0px) !important;
  }

  [data-test="login-form"] .ant-btn-default .anticon {
    color: var(--bphn-gold) !important;
  }

  /* ---- Divider ---- */
  [data-test="login-form"] .ant-divider {
    border-color: rgba(255, 255, 255, 0.06) !important;

  [data-test="login-form"] .ant-divider-inner-text {

  [data-test="login-form"] a {

  [data-test="login-form"] .ant-typography a:hover,
