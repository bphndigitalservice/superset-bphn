include:
  - path: docker/compose.examples.yaml
    profiles:
      - examples

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - superset_internal
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - superset_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  superset:
    build: .
    image: superset-bphn:local
    restart: unless-stopped
    networks:
      - superset_internal
    env_file: .env
    environment:
      LOAD_EXAMPLES: ${LOAD_EXAMPLES:-false}
    ports:
      - "8088:8088"
    volumes:
      - ./superset/assets/branding:/app/superset/static/assets/branding:ro
      - superset_home:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/docker/entrypoints/entrypoint-with-examples.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  superset-worker:
    image: superset-bphn:local
    restart: unless-stopped
    networks:
      - superset_internal
    env_file: .env
    volumes:
      - ./superset/assets/branding:/app/superset/static/assets/branding:ro
      - superset_home:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      superset:
        condition: service_healthy
    command:
      [
        "celery",
        "--app=superset.tasks.celery_app:app",
        "worker",
        "-O",
        "fair",
        "-l",
        "INFO",
      ]

  superset-beat:
    image: superset-bphn:local
    restart: unless-stopped
    networks:
      - superset_internal
    env_file: .env
    volumes:
      - superset_home:/app/superset_home
    depends_on:
      redis:
        condition: service_healthy
      superset:
        condition: service_healthy
    command:
      [
        "celery",
        "--app=superset.tasks.celery_app:app",
        "beat",
        "--pidfile",
        "/tmp/celerybeat.pid",
        "-l",
        "INFO",
        "-s",
        "/app/superset_home/celerybeat-schedule",
      ]

volumes:
  postgres_data:
  superset_home:

networks:
  # Avoid 172.17.0.0/16 — that range is docker0's default; Compose sometimes assigns it to
  # project "default" bridges and breaks embedded DNS / routing for app containers.
  superset_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
