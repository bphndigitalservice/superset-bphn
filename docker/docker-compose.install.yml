services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - superset-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - superset-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  superset:
    image: ghcr.io/bphndigitalservice/superset-bphn:latest
    restart: unless-stopped
    networks:
      - superset-network
    env_file: .env
    environment:
      LOAD_EXAMPLES: ${LOAD_EXAMPLES:-false}
    ports:
      - "${SUPERSET_PORT_PUBLISH_HOST:-0.0.0.0}:8088:8088"
    volumes:
      - ./branding:/app/superset/static/assets/branding:ro
      - superset_home:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/docker/entrypoints/entrypoint-with-examples.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  superset-worker:
    image: ghcr.io/bphndigitalservice/superset-bphn:latest
    restart: unless-stopped
    networks:
      - superset-network
    env_file: .env
    volumes:
      - ./branding:/app/superset/static/assets/branding:ro
      - superset_home:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      superset:
        condition: service_healthy
    command:
      [
        "celery",
        "--app=superset.tasks.celery_app:app",
        "worker",
        "-O",
        "fair",
        "-l",
        "INFO",
      ]

  superset-beat:
    image: ghcr.io/bphndigitalservice/superset-bphn:latest
    restart: unless-stopped
    networks:
      - superset-network
    env_file: .env
    volumes:
      - superset_home:/app/superset_home
    depends_on:
      redis:
        condition: service_healthy
      superset:
        condition: service_healthy
    command:
      [
        "celery",
        "--app=superset.tasks.celery_app:app",
        "beat",
        "--pidfile",
        "/tmp/celerybeat.pid",
        "-l",
        "INFO",
        "-s",
        "/app/superset_home/celerybeat-schedule",
      ]

volumes:
  postgres_data:
  superset_home:

networks:
  superset-network:
    name: superset-network
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
